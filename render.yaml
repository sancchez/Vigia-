# Blueprint de Render para Vigia (https://render.com/docs/blueprint-spec,
# verificado contra la doc real antes de escribir esto, no adivinado).
#
# UN SOLO servicio -- backend FastAPI (Docker) sirviendo también el build de
# producción del frontend (React/Vite) como archivos estáticos desde el mismo
# proceso. Antes de esta sesión este archivo definía dos servicios (backend +
# un "Static Site" de Render aparte para el frontend) -- se combinaron porque
# el `Dockerfile` ahora compila el frontend en una etapa de build (node) y
# copia el resultado (`frontend/dist/`) a la imagen final, y `api/main.py`
# lo sirve él mismo (mount de estáticos + catch-all para las rutas de React
# Router) cuando detecta que `frontend/dist/` existe. Menos servicios = menos
# configuración y menos costo (objetivo explícito de esta sesión, usuario
# budget-conscious). Deploy real: subir este archivo a la raíz del repo y
# usar "New +" -> "Blueprint" en el dashboard de Render, apuntando al repo de
# GitHub -- Render lo detecta solo. Ver docs/despliegue.md para el paso a
# paso completo (cuenta, repo, env vars).
#
# OJO -- limitación real de la capa gratuita de Render (confirmado en su
# documentación, no supuesto): un "Web Service" free tier tiene filesystem
# efímero, así que un SQLite local (DATABASE_URL=sqlite:///...) se PIERDE en
# cada redeploy/restart/spin-down. Para persistencia real hay dos caminos:
# (a) agregar el bloque `databases:` de abajo (Postgres administrado, gratis
# los primeros 30 días, luego expira si no se pasa a un plan pago), o
# (b) subir el backend a un plan pago y agregar un Persistent Disk. Ver
# docs/despliegue.md sección de Render para el detalle y el porqué de cada
# opción.

services:
  - type: web
    name: vigia-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        # Default: SQLite efímero en este plan (ver aviso arriba). Cambiar a
        # la connection string del bloque `databases` de abajo (o a la de un
        # Postgres externo) para persistencia real.
        value: sqlite:///./ciberseguridad.db
      - key: CORS_ORIGINS
        # Con un solo servicio, el frontend se sirve desde el MISMO origen
        # que la API (mismo dominio `*.onrender.com`) -- las llamadas del
        # frontend ya no son cross-origin, así que CORS_ORIGINS deja de ser
        # estrictamente necesario para que el panel funcione. Se deja
        # configurable de todas formas (valor de ejemplo abajo) por si algo
        # más necesita golpear la API desde otro origen (Postman, un script,
        # o el flujo de dev local con dos servidores separados de
        # HANDOFF.md, que sigue funcionando igual que siempre).
        value: https://vigia-backend.onrender.com
      - key: VIGIA_CLAUDE_CLI_TIMEOUT
        value: "300"
      - key: VIGIA_SCAN_INTERVAL_HOURS
        value: "6"
      - key: VIGIA_CERTSTREAM_ENABLED
        value: "false"
      - key: VIGIA_CERTSTREAM_URL
        sync: false
      - key: VIGIA_CERTSTREAM_REFRESH_MINUTES
        value: "30"

# Postgres administrado, opcional -- descomentar si se quiere persistencia
# real sin pasar a un plan pago del web service. Gratis por 30 días (ver
# docs/despliegue.md), luego hay que pasarlo a un plan pago o perder los
# datos tras el período de gracia de Render.
#
# databases:
#   - name: vigia-db
#     plan: free
#     postgresMajorVersion: "16"
